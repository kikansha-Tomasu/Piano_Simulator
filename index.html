<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Piano</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: linear-gradient(150deg, #dce8ff 0%, #ede5ff 60%, #f5deff 100%);
      color: #2a2d3e;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }
    body { display: flex; flex-direction: column; }

    /* ---- Header ---- */
    .header {
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(100,110,200,0.15);
      flex-wrap: wrap;
    }
    .app-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #4a5890;
      flex-shrink: 0;
    }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 11px 20px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      touch-action: manipulation;
      white-space: nowrap;
    }
    button:active { transform: scale(0.92); }
    button:disabled { opacity: 0.28; pointer-events: none; }
    #btn-record { background: #e74c3c; color: #fff; }
    #btn-record.recording { background: #c0392b; animation: blink 0.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }
    #btn-stop  { background: #8090b0; color: #fff; }
    #btn-play  { background: #27ae60; color: #fff; }
    #btn-clear { background: #a0a8c0; color: #fff; }
    #status {
      font-size: 17px;
      font-weight: 500;
      color: #6a7090;
      min-width: 80px;
      margin-left: auto;
    }
    #status.rec  { color: #cc3333; }
    #status.play { color: #1a8a50; }

    /* ---- Keyboard area ---- */
    .keyboard-area {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 20px 0 16px;
      gap: 0;
      min-height: 0;
    }
    .keyboard-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
      min-width: 0;
    }
    .keyboard-scroll::-webkit-scrollbar { height: 4px; }
    .keyboard-scroll::-webkit-scrollbar-track { background: rgba(0,0,80,0.06); border-radius: 2px; }
    .keyboard-scroll::-webkit-scrollbar-thumb { background: rgba(60,80,180,0.25); border-radius: 2px; }

    .keyboard-frame {
      display: inline-block;
      background: #b8c4dc;
      border-radius: 4px 4px 12px 12px;
      padding: 8px 10px 14px;
      box-shadow: 0 8px 30px rgba(60,80,160,0.2), 0 2px 8px rgba(60,80,160,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .keyboard {
      position: relative;
      flex-shrink: 0;
    }

    /* ---- Keys ---- */
    .key {
      position: absolute;
      top: 0;
      border-radius: 0 0 5px 5px;
      cursor: pointer;
      touch-action: none;
    }
    .key.white {
      background: linear-gradient(180deg, #dedad0 0%, #f8f4eb 20%, #faf7f0 100%);
      border: 1px solid #aaa;
      border-top: 2px solid #999;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 7px;
      box-shadow: inset 0 -4px 6px rgba(0,0,0,0.08);
    }
    .key.white:hover { background: linear-gradient(180deg, #cdd3e8 0%, #e8eeff 20%, #edf1ff 100%); }
    .key.white.active {
      background: linear-gradient(180deg, #6aa0f0 0%, #b8d4ff 20%, #cce0ff 100%);
      border-color: #5090e0;
      box-shadow: inset 0 3px 6px rgba(0,0,80,0.2);
    }
    .key.black {
      background: linear-gradient(180deg, #555 0%, #111 15%, #090909 100%);
      border: 1px solid #000;
      border-top: 3px solid #666;
      z-index: 2;
      box-shadow: 2px 4px 8px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .key.black:hover { background: linear-gradient(180deg, #777 0%, #222 15%, #111 100%); }
    .key.black.active {
      background: linear-gradient(180deg, #4a80e0 0%, #1a50b0 15%, #0f3a90 100%);
      border-top-color: #6aa0ff;
    }
    .key-label {
      font-size: 13px;
      font-weight: 600;
      color: #6a6a7a;
      pointer-events: none;
      letter-spacing: 0;
    }
    .key.white.active .key-label { color: #1a3a9a; }
    .key.black .key-label {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) rotate(-90deg);
      font-size: 11px;
      color: #bbb;
      white-space: nowrap;
    }
    .key.black.active .key-label { color: #aad4ff; }
  </style>
</head>
<body>

<div class="header">
  <div class="app-title">Piano</div>
  <div class="controls">
    <button id="btn-record">&#9679; 録音</button>
    <button id="btn-stop" disabled>&#9632; 停止</button>
    <button id="btn-play" disabled>&#9654; 再生</button>
    <button id="btn-clear" disabled>&#10005; 消去</button>
  </div>
  <span id="status"></span>
</div>

<div class="keyboard-area">
  <div class="keyboard-scroll" id="keyboard-scroll">
    <div class="keyboard-frame">
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>
</div>

<script>
  // ---- NOTES ----
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const BLACK_SEMIS = new Set([1, 3, 6, 8, 10]);
  // Fractional left position within octave (in white-key-width units)
  const BLACK_FRAC = { 1: 0.67, 3: 1.67, 6: 3.67, 8: 4.67, 10: 5.67 };
  const WHITE_POS  = { 0: 0, 2: 1, 4: 2, 5: 3, 7: 4, 9: 5, 11: 6 };
  const TOTAL_WHITE = 21; // 3 octaves * 7 white keys
  const FRAME_PAD = 20;   // frame left+right padding combined (10px each)

  // Key dimensions — computed once
  const scrollW = window.innerWidth;
  const WHITE_KEY_W = Math.max(40, Math.floor((scrollW - FRAME_PAD) / TOTAL_WHITE));
  const BLACK_KEY_W = Math.round(WHITE_KEY_W * 0.61);
  const WHITE_KEY_H = 150;
  const BLACK_KEY_H = 96;
  const KB_W = TOTAL_WHITE * WHITE_KEY_W;

  // Build note list (C3 to B5)
  const notes = [];
  const noteByMidi = new Map();
  for (let oct = 3; oct <= 5; oct++) {
    const off = (oct - 3) * 7;
    for (let s = 0; s < 12; s++) {
      const midi = (oct + 1) * 12 + s; // C3=48, C4=60, C5=72
      const name = NOTE_NAMES[s] + oct;
      const isBlack = BLACK_SEMIS.has(s);
      const left = isBlack
        ? Math.round((off + BLACK_FRAC[s]) * WHITE_KEY_W - BLACK_KEY_W / 2)
        : (off + WHITE_POS[s]) * WHITE_KEY_W;
      const freq = 440 * Math.pow(2, (midi - 69) / 12);
      const note = { name, midi, isBlack, left, freq };
      notes.push(note);
      noteByMidi.set(midi, note);
    }
  }

  // ---- DOM BUILD ----
  const keyEls = new Map();

  (function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.style.width  = KB_W + 'px';
    kb.style.height = WHITE_KEY_H + 'px';

    // White keys first (z-index 1), then black keys (z-index 2)
    const sorted = [...notes].sort((a, b) => +a.isBlack - +b.isBlack);
    for (const note of sorted) {
      const el = document.createElement('div');
      el.className = 'key ' + (note.isBlack ? 'black' : 'white');
      el.style.left   = note.left + 'px';
      el.style.width  = (note.isBlack ? BLACK_KEY_W : WHITE_KEY_W) + 'px';
      el.style.height = (note.isBlack ? BLACK_KEY_H : WHITE_KEY_H) + 'px';
      el.dataset.midi = note.midi;
      const lbl = document.createElement('span');
      lbl.className = 'key-label';
      lbl.textContent = note.name;
      el.appendChild(lbl);
      kb.appendChild(el);
      keyEls.set(note.midi, el);
    }
  })();

  // ---- AUDIO ----
  let audioCtx = null;
  const active = new Map(); // midi → { o1, o2, g }

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function noteOn(midi) {
    if (active.has(midi)) return;
    const c = getCtx();
    const note = noteByMidi.get(midi);
    if (!note) return;

    const o1 = c.createOscillator(), o2 = c.createOscillator(), g = c.createGain();
    o1.type = o2.type = 'triangle';
    o1.frequency.value = note.freq;
    o2.frequency.value = note.freq * 1.003; // slight detune for warmth
    o1.connect(g); o2.connect(g); g.connect(c.destination);

    const now = c.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.38, now + 0.008); // attack
    g.gain.exponentialRampToValueAtTime(0.20, now + 0.3); // decay to sustain
    o1.start(now); o2.start(now);

    active.set(midi, { o1, o2, g });
    keyEls.get(midi)?.classList.add('active');

    if (rec.on) rec.events.push({ t: c.currentTime - rec.t0, type: 'on', midi });
  }

  function noteOff(midi) {
    const node = active.get(midi);
    if (!node) return;
    const c = getCtx();
    const { o1, o2, g } = node;
    const now = c.currentTime;
    const rel = 0.5;
    g.gain.cancelScheduledValues(now);
    g.gain.setValueAtTime(g.gain.value, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + rel); // release
    o1.stop(now + rel); o2.stop(now + rel);
    active.delete(midi);
    keyEls.get(midi)?.classList.remove('active');

    if (rec.on) rec.events.push({ t: c.currentTime - rec.t0, type: 'off', midi });
  }

  function allOff() { [...active.keys()].forEach(noteOff); }

  // ---- RECORDING / PLAYBACK ----
  const rec = { on: false, t0: 0, events: [], saved: [] };
  let appState = 'idle'; // 'idle' | 'recording' | 'playing'
  let timerInt = null;
  let pbTos = [];

  function startRec() {
    allOff();
    const c = getCtx();
    rec.on = true; rec.t0 = c.currentTime; rec.events = [];
    appState = 'recording';
    let s = 0;
    setStatus('● 録音中  0:00', 'rec');
    timerInt = setInterval(() => {
      s++;
      setStatus('● 録音中  ' + Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'), 'rec');
    }, 1000);
    syncButtons();
  }

  function stopRec() {
    allOff();
    rec.on = false;
    rec.saved = rec.events.slice();
    clearInterval(timerInt);
    appState = 'idle';
    setStatus(rec.saved.length ? '録音完了' : '', '');
    syncButtons();
  }

  function startPlay() {
    if (!rec.saved.length) return;
    allOff();
    appState = 'playing';
    setStatus('▶ 再生中...', 'play');
    syncButtons();
    pbTos = [];
    rec.saved.forEach(ev => {
      pbTos.push(setTimeout(() => {
        ev.type === 'on' ? noteOn(ev.midi) : noteOff(ev.midi);
      }, ev.t * 1000));
    });
    const last = rec.saved[rec.saved.length - 1];
    pbTos.push(setTimeout(() => {
      allOff(); appState = 'idle'; pbTos = [];
      setStatus('録音完了', ''); syncButtons();
    }, ((last ? last.t : 0) + 1.3) * 1000));
  }

  function stopPlay() {
    pbTos.forEach(clearTimeout); pbTos = [];
    allOff(); appState = 'idle';
    setStatus('録音完了', ''); syncButtons();
  }

  function clearRec() {
    rec.saved = []; rec.events = []; appState = 'idle';
    setStatus('', ''); syncButtons();
  }

  // ---- UI ----
  function setStatus(text, cls) {
    const el = document.getElementById('status');
    el.textContent = text; el.className = cls || '';
  }

  function syncButtons() {
    const bR = document.getElementById('btn-record');
    const bS = document.getElementById('btn-stop');
    const bP = document.getElementById('btn-play');
    const bC = document.getElementById('btn-clear');
    const has = rec.saved.length > 0;
    bR.disabled = appState !== 'idle';
    bR.classList.toggle('recording', appState === 'recording');
    bS.disabled = appState === 'idle';
    bP.disabled = appState !== 'idle' || !has;
    bC.disabled = appState !== 'idle' || !has;
  }

  document.getElementById('btn-record').addEventListener('click', () => { if (appState==='idle') startRec(); });
  document.getElementById('btn-stop').addEventListener('click',   () => {
    if (appState==='recording') stopRec();
    else if (appState==='playing') stopPlay();
  });
  document.getElementById('btn-play').addEventListener('click',   () => { if (appState==='idle') startPlay(); });
  document.getElementById('btn-clear').addEventListener('click',  () => { if (appState==='idle') clearRec(); });

  const scrollEl = document.getElementById('keyboard-scroll');

  // ---- INPUT ----
  const touchMap = new Map(); // touchId → midi

  function midiAt(x, y) {
    const els = document.elementsFromPoint(x, y);
    for (const el of els) {
      if (el.dataset && el.dataset.midi) return +el.dataset.midi;
    }
    return null;
  }

  const kb = document.getElementById('keyboard');

  kb.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const m = midiAt(t.clientX, t.clientY);
      if (m != null) { touchMap.set(t.identifier, m); noteOn(m); }
    }
  }, { passive: false });

  kb.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const newM = midiAt(t.clientX, t.clientY);
      const oldM = touchMap.get(t.identifier);
      if (newM !== oldM) {
        if (oldM !== undefined) noteOff(oldM);
        if (newM != null) { touchMap.set(t.identifier, newM); noteOn(newM); }
        else touchMap.delete(t.identifier);
      }
    }
  }, { passive: false });

  function onTouchEnd(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const m = touchMap.get(t.identifier);
      if (m !== undefined) { noteOff(m); touchMap.delete(t.identifier); }
    }
  }
  kb.addEventListener('touchend',   onTouchEnd, { passive: false });
  kb.addEventListener('touchcancel', onTouchEnd, { passive: false });

  // Mouse support (for PC testing)
  let mouseM = null;
  kb.addEventListener('mousedown', e => {
    const el = e.target.closest('[data-midi]');
    if (!el) return;
    mouseM = +el.dataset.midi; noteOn(mouseM);
  });
  kb.addEventListener('mousemove', e => {
    if (mouseM == null) return;
    const el = e.target.closest('[data-midi]');
    if (!el) return;
    const m = +el.dataset.midi;
    if (m !== mouseM) { noteOff(mouseM); mouseM = m; noteOn(m); }
  });
  window.addEventListener('mouseup', () => {
    if (mouseM != null) { noteOff(mouseM); mouseM = null; }
  });

  // ---- INIT ----
  syncButtons();

  // Scroll to show C3–C5 range (start at C3)
  requestAnimationFrame(() => {
    const c4 = noteByMidi.get(60); // C4 = MIDI 60
    if (c4) scrollEl.scrollLeft = Math.max(0, c4.left - scrollEl.clientWidth / 2);
  });
</script>
</body>
</html>
